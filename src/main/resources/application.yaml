spring:

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/kafka_project?rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # 벤치마크 신뢰도 확보를 위한 로그 off (매우 탁월한 선택)
    properties:
      hibernate:
        jdbc:
          batch_size: 500 # 100만 건 대량 삽입 시 500건 단위로 일괄(Batch) 처리
        order_inserts: true # insert 쿼리 재정렬을 유도하여 묶음(Batch) 효과 극대화